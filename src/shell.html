<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>ztracing</title>
    <style>
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
        canvas.emscripten { border: 0 none; width: 100%; height: 100%; display: block; }
        #error-container { display: none; padding: 20px; }
        #error-container h1 { color: #ff4444; }
    </style>
</head>
<body>
    <div id="error-container">
        <h1>Error</h1>
        <p id="error-message"></p>
    </div>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <script>
      function showError(errorCode, errorMessage) {
        console.error(`ztracing error [${errorCode}]:`, errorMessage);
        document.getElementById('canvas').style.display = 'none';
        const container = document.getElementById('error-container');
        container.style.display = 'block';
        document.getElementById('error-message').textContent = errorMessage + ` (Error Code: ${errorCode})`;
      }

      var Module = {
        onRuntimeInitialized: () => {
          Module.ztracing_start({
            canvasSelector: '#canvas',
            getFont: async () => {
              const response = await fetch('https://fonts.gstatic.com/s/notosans/v42/o-0mIpQlx3QUlC5A4PNB6Ryti20_6n1iPHjcz6L1SoM-jCpoiyD9A-9a6Vc.ttf');
              if (!response.ok) throw new Error(`Font fetch failed: ${response.status}`);
              return await response.arrayBuffer();
            },
            getTrace: async () => {
              const urlParams = new URLSearchParams(window.location.search);
              const traceUrl = urlParams.get('trace');
              if (!traceUrl) return null;

              const response = await fetch(traceUrl);
              if (!response.ok) {
                throw new Error(`Failed to fetch trace: ${response.status} ${response.statusText}`);
              }
              return {
                stream: response.body,
                name: traceUrl.split('/').pop() || 'trace.json',
                size: response.headers.get('content-length'),
                contentType: response.headers.get('content-type')
              };
            },
            onError: showError
          });
        }
      };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
