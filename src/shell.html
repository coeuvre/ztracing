<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>ztracing</title>
    <style>
        body { margin: 0; background-color: black; }
        canvas.emscripten { border: 0 none; background-color: black; width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <script>
      var Module = {
        onRuntimeInitialized: () => {
          Module.ztracing_start({
            canvasSelector: '#canvas',
            // Noto Sans TTF URL extracted from Google Fonts CSS API.
            fontUrl: 'https://fonts.gstatic.com/s/notosans/v42/o-0mIpQlx3QUlC5A4PNB6Ryti20_6n1iPHjcz6L1SoM-jCpoiyD9A-9a6Vc.ttf'
          });
        }
      };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
