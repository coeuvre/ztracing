<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>ztracing</title>
    <style>
        body { margin: 0; background-color: black; color: white; font-family: sans-serif; }
        canvas.emscripten { display: none; border: 0 none; background-color: black; width: 100vw; height: 100vh; }
        #error-container { display: none; padding: 20px; }
        #error-container h1 { color: #ff4444; }
        #loading-container { display: none; padding: 20px; }
    </style>
</head>
<body>
    <div id="error-container">
        <h1>Error</h1>
        <p id="error-message"></p>
    </div>
    <div id="loading-container">
        <p>Loading trace...</p>
    </div>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <script>
      function showError(message) {
        console.error('ztracing error:', message);
        document.getElementById('canvas').style.display = 'none';
        document.getElementById('loading-container').style.display = 'none';
        const container = document.getElementById('error-container');
        container.style.display = 'block';
        document.getElementById('error-message').textContent = message;
      }

      function showLoading() {
        document.getElementById('loading-container').style.display = 'block';
      }

      function hideLoading() {
        document.getElementById('loading-container').style.display = 'none';
      }

      function showCanvas() {
        document.getElementById('canvas').style.display = 'block';
      }

      var Module = {
        onRuntimeInitialized: async () => {
          const urlParams = new URLSearchParams(window.location.search);
          const traceUrl = urlParams.get('trace');
          let trace = null;

          if (traceUrl) {
            showLoading();
            try {
              const response = await fetch(traceUrl);
              if (response.ok) {
                trace = {
                  stream: response.body,
                  name: traceUrl.split('/').pop() || 'trace.json',
                  size: response.headers.get('content-length'),
                  contentType: response.headers.get('content-type')
                };
              } else {
                showError(`Failed to fetch trace from URL: ${traceUrl} (${response.status} ${response.statusText})`);
                return;
              }
            } catch (e) {
              showError(`Error fetching trace from URL: ${traceUrl}. ${e.message}`);
              return;
            } finally {
              hideLoading();
            }
          }

          showCanvas();
          Module.ztracing_start({
            canvasSelector: '#canvas',
            // Noto Sans TTF URL extracted from Google Fonts CSS API.
            fontUrl: 'https://fonts.gstatic.com/s/notosans/v42/o-0mIpQlx3QUlC5A4PNB6Ryti20_6n1iPHjcz6L1SoM-jCpoiyD9A-9a6Vc.ttf',
            trace: trace
          });
        }
      };
    </script>
    {{{ SCRIPT }}}
</body>
</html>
